<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AI Chats Auto Save</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 300px;
      margin: 0;
      background: #f7f8fa;
      color: #1f2937;
    }

    .wrap { padding: 12px; }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .badge {
      font-size: 9px;
      font-weight: 600;
      line-height: 1;
      padding: 2px 7px;
      border-radius: 999px;
      background: #16a34a;
      color: #ffffff;
      min-width: 20px;
      text-align: center;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      padding: 10px;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .08);
      margin-bottom: 10px;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
      border-radius: 6px;
      padding: 8px;
      font-size: 12px;
      margin-bottom: 10px;
    }

    .list {
      max-height: 160px;
      overflow: auto;
    }

    .item {
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 8px;
      margin-bottom: 6px;
      font-size: 12px;
      background: #fff;
    }

    button {
      margin-top: 6px;
      border: none;
      border-radius: 4px;
      padding: 5px 8px;
      background: #16a34a;
      color: white;
      cursor: pointer;
      font-size: 12px;
    }

    button.secondary {
      background: #4b5563;
    }

    .drive-row {
      font-size: 12px;
      color: #6b7280;
      margin-top: 8px;
    }

    .meta-row {
      font-size: 11px;
      color: #6b7280;
      margin-top: 6px;
      word-break: break-all;
    }

    .drive-link {
      display: none;
      font-size: 12px;
      margin-top: 6px;
    }

    .drive-link a {
      color: #2563eb;
      text-decoration: none;
    }

    .drive-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <strong>AI Chats Auto Save</strong>
      <span id="statusBadge" class="badge">ON</span>
    </div>

      <div id="errorNotice" class="error" style="display:none;">Upload failed</div>

    <div class="card">
      <div>Status: <strong id="progress">ON</strong></div>
      <div id="progressHint" style="font-size:12px;color:#6b7280;margin-top:4px;">No supported AI chat tab detected</div>
      <div style="font-size:12px;color:#6b7280;margin-top:6px;">AI chat content is saved to your Google Drive after connection.</div>
      <div class="drive-row">Google Drive: <strong id="driveStatus">Not connected</strong></div>
      <div id="folderRow" class="drive-link"><a id="folderLink" href="#" target="_blank" rel="noopener">Open Google Drive folder</a></div>
      <div class="meta-row">Extension ID: <span id="extensionId">loading...</span></div>
      <button id="connectButton" type="button">Connect Google Drive</button>
    </div>

    <div class="card">
      <div style="margin-bottom:6px;"><strong>Failed uploads</strong></div>
      <div id="failedList" class="list"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
