<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>ChatGPT Auto Save</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 300px;
      margin: 0;
      background: #f7f8fa;
      color: #1f2937;
    }

    .wrap { padding: 12px; }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .badge {
      font-size: 9px;
      font-weight: 600;
      line-height: 1;
      padding: 2px 7px;
      border-radius: 999px;
      background: #16a34a;
      color: #ffffff;
      min-width: 20px;
      text-align: center;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      padding: 10px;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .08);
      margin-bottom: 10px;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
      border-radius: 6px;
      padding: 8px;
      font-size: 12px;
      margin-bottom: 10px;
    }

    .list {
      max-height: 160px;
      overflow: auto;
    }

    .item {
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 8px;
      margin-bottom: 6px;
      font-size: 12px;
      background: #fff;
    }

    button {
      margin-top: 6px;
      border: none;
      border-radius: 4px;
      padding: 5px 8px;
      background: #16a34a;
      color: white;
      cursor: pointer;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <strong>ChatGPT Auto Save</strong>
      <span id="statusBadge" class="badge">ON</span>
    </div>

    <div id="errorNotice" class="error" style="display:none;">文件上传失败</div>

    <div class="card">
      <div>当前状态：<strong id="progress">ON</strong></div>
      <div id="progressHint" style="font-size:12px;color:#6b7280;margin-top:4px;">已检测到 ChatGPT 页面</div>
    </div>

    <div class="card">
      <div style="margin-bottom:6px;"><strong>失败列表（可手动重传）</strong></div>
      <div id="failedList" class="list"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
